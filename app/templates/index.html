<!DOCTYPE html>
<html>
<head>
    <title>Heinlin Ops</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/styles.css?v=9101">
</head>
<body>
    <div class="page">
        <h1>Heinlin Ops</h1>
        <p>Field dashboard for service stops and job records.</p>

        <p><a class="button-link" href="/properties/new">Add Property</a></p>

        <div class="card">
            <h2>All Properties</h2>

            {% if properties %}
                <ul>
                {% for p in properties %}
                    <li style="margin-bottom: 10px;">
                        <a href="/properties/{{ p.id }}">{{ p.address }}</a>
                        <div class="muted">
                            Client: {{ p.client.name if p.client else "—" }}
                        </div>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No properties yet.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
