<!DOCTYPE html>
<html>
<head>
    <title>Add Property</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/styles.css?v=9101">
</head>
<body>
    <div class="page">
        <h1>Add Property</h1>
        <p><a href="/">Back to Properties</a></p>

        <div class="card">
            <form method="post" action="/properties/new">
                <label>Property Address</label>
                <input type="text" name="address" required>

                <label>Pool Type</label>
                <input type="text" name="pool_type">

                <label>Property Notes</label>
                <textarea name="notes"></textarea>

                <h2>Attach to Existing Client</h2>
                <label>Select Existing Client</label>
                <select name="client_id">
                    <option value="">-- Create New Client Instead --</option>
                    {% for c in clients %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>

                <h2>Or Create New Client</h2>
                <label>Client Name</label>
                <input type="text" name="client_name">

                <label>Client Phone</label>
                <input type="text" name="client_phone">

                <label>Client Email</label>
                <input type="email" name="client_email">

                <button type="submit">Create Property</button>
            </form>
        </div>
    </div>
</body>
</html>
