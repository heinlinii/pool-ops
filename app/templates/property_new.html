<!DOCTYPE html>
<html>
<head>
    <title>Add Property</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/styles.css?v=2001">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <h1>Add Property</h1>
            <p>Create a new property and attach it to an existing or new client.</p>
            <div class="quick-links">
                <a href="/" class="button-link">Back to Properties</a>
            </div>
        </header>

        <section class="card">
            <form method="post" action="/properties/new" class="form-stack">

                <div class="section-gap" style="border-top:0; padding-top:0; margin-top:0;">
                    <h2>Property Info</h2>

                    <label>Property Address</label>
                    <input type="text" name="address" placeholder="1234 Oak Hill Rd" required>

                    <label>Pool Type</label>
                    <input type="text" name="pool_type" placeholder="Gunite, Vinyl, Fiberglass, etc.">

                    <label>Property Notes</label>
                    <textarea name="notes" placeholder="Auto cover issue, equipment notes, gate code, dog in yard, etc."></textarea>
                </div>

                <div class="section-gap">
                    <h2>Attach to Existing Client</h2>

                    <label>Select Existing Client</label>
                    <select name="client_id">
                        <option value="">-- Create New Client Instead --</option>
                        {% for c in clients %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>

                    <div class="helper">
                        If you choose an existing client, the new-client fields below are ignored.
                    </div>
                </div>

                <div class="section-gap">
                    <h2>Or Create New Client</h2>

                    <label>Client Name</label>
                    <input type="text" name="client_name" placeholder="John Smith">

                    <label>Client Phone</label>
                    <input type="text" name="client_phone" placeholder="812-555-1212">

                    <label>Client Email</label>
                    <input type="email" name="client_email" placeholder="john@email.com">
                </div>

                <div class="section-gap">
                    <button type="submit">Create Property</button>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
