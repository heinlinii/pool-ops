<!DOCTYPE html>
<html>
<head>
    <title>New Service Stop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/styles.css?v=1000">
</head>
<body>

<div style="background:red;color:white;padding:12px;font-size:20px;">
    NEW VERSION LOADED
</div>

<h1>New Service Stop</h1>
<p>{{ property.address }}</p>

<form method="post" enctype="multipart/form-data">

    <h2>Before Photos</h2>
    <input type="file" name="before_photos" accept="image/*" capture="environment" multiple>

    <h2>Details</h2>

    <label>Date</label>
    <input type="date" name="date_value">

    <label>Tech Name</label>
    <input type="text" name="tech_name">

    <label>Problem</label>
    <textarea name="problem_reported"></textarea>

    <label>Work</label>
    <textarea name="work_performed"></textarea>

    <label>Recommendation</label>
    <textarea name="recommendation"></textarea>

    <h2>Billing</h2>

    <input type="number" step="0.01" name="billed_amount" placeholder="Service Charge">
    <input type="number" step="0.1" name="labor_hours" placeholder="Labor Hours">
    <input type="number" step="0.01" name="material_cost" placeholder="Material Cost">
    <input type="number" step="0.01" name="trip_charge" placeholder="Trip Charge">
    <input type="number" step="0.01" name="tax" placeholder="Tax">

    <select name="paid_status">
        <option value="unpaid">Unpaid</option>
        <option value="paid">Paid</option>
    </select>

    <textarea name="invoice_notes" placeholder="Notes"></textarea>

    <h2>After Photos</h2>
    <input type="file" name="after_photos" accept="image/*" capture="environment" multiple>

    <h2>Other Files</h2>
    <input type="file" name="general_files" multiple>

    <br><br>
    <button type="submit">Save</button>

</form>

</body>
</html>
