<div class="card">
    <h2>Service Stops</h2>
    <p><a class="button-link" href="/properties/{{ property.id }}/service-stop/new">New Service Stop</a></p>

    {% if property.service_stops %}
        <ul>
        {% for stop in property.service_stops %}
            <li>
                <a href="/service-stops/{{ stop.id }}">
                    {{ stop.date or "No date" }} - {{ stop.problem_reported or "No problem entered" }}
                </a>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No service stops yet.</p>
    {% endif %}
</div>
